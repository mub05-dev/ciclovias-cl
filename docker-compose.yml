services:
  postgres:
    image: pgrouting/pgrouting:16-3.5-3.7
    container_name: ciclovias-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ciclovias
      POSTGRES_PASSWORD: ciclovias_dev
      POSTGRES_DB: ciclovias_cl
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ciclovias -d ciclovias_cl"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: